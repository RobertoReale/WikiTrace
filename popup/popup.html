<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiTrace</title>
  <style>
    :root {
      --bg0: #0f172a;
      --bg1: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #4ade80;
      --badge-saved-bg: #14532d;
      --badge-saved-color: #4ade80;
      --badge-unsaved-bg: #1e293b;
    }

    [data-theme="light"] {
      --bg0: #f8fafc;
      --bg1: #f1f5f9;
      --border: #cbd5e1;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --success: #16a34a;
      --badge-saved-bg: #dcfce7;
      --badge-saved-color: #16a34a;
      --badge-unsaved-bg: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: var(--bg0);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 22px; height: 22px; background: var(--accent); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .theme-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 14px; padding: 2px 5px;
      border-radius: 4px; line-height: 1;
    }
    .theme-btn:hover { background: var(--bg1); color: var(--text); }
    .dashboard-link {
      font-size: 11px; color: var(--accent); text-decoration: none;
      cursor: pointer; background: none; border: none;
      padding: 2px 6px; border-radius: 4px;
    }
    .dashboard-link:hover { background: var(--bg1); }

    .page-block { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .page-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text3); margin-bottom: 5px;
    }
    .page-title {
      font-weight: 600; color: var(--text); line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .page-cats { margin-top: 4px; font-size: 11px; color: var(--text2); }
    .badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; letter-spacing: .03em;
    }
    .badge-saved   { background: var(--badge-saved-bg); color: var(--badge-saved-color); }
    .badge-unsaved { background: var(--badge-unsaved-bg); color: var(--text2); }
    .not-wiki { color: var(--text3); font-style: italic; }

    .btn-save {
      display: block; width: calc(100% - 28px); margin: 10px 14px 0;
      padding: 8px; border: none; border-radius: 6px;
      background: var(--accent); color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-save:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-save:disabled { background: var(--bg1); color: var(--text3); cursor: default; }

    .stats { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-top: 12px; }
    .stat { flex: 1; padding: 10px 0; text-align: center; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label {
      font-size: 10px; color: var(--text3); margin-top: 3px;
      text-transform: uppercase; letter-spacing: .05em;
    }

    .settings { padding: 12px 14px; }
    .settings label {
      display: flex; align-items: center;
      justify-content: space-between; color: var(--text2); font-size: 12px;
    }
    select {
      background: var(--bg1); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 3px 6px; font-size: 12px; cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--accent); }

    #status-msg { padding: 0 14px 10px; font-size: 11px; color: var(--success); min-height: 20px; }

    .btn-save-later {
      display: block; width: calc(100% - 28px); margin: 6px 14px 0;
      padding: 7px; border: 1px solid var(--accent); border-radius: 6px;
      background: transparent; color: var(--accent); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background .15s, color .15s;
    }
    .btn-save-later:hover:not(:disabled) { background: var(--accent); color: #fff; }
    .btn-save-later:disabled { border-color: var(--border); color: var(--text3); cursor: default; }

    .rl-picker {
      margin: 8px 14px 0; padding: 10px;
      background: var(--bg1); border: 1px solid var(--border); border-radius: 6px;
    }
    .rl-picker-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text3); margin-bottom: 6px;
    }
    .rl-input {
      width: 100%; padding: 6px 8px; background: var(--bg0);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); font-size: 12px; outline: none;
    }
    .rl-input:focus { border-color: var(--accent); }
    .rl-cats { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .rl-cat-pill {
      padding: 2px 8px; border-radius: 10px; font-size: 10px;
      background: var(--bg0); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer; transition: border-color .1s, color .1s;
    }
    .rl-cat-pill:hover { border-color: var(--accent); color: var(--accent); }
    .rl-picker-actions { display: flex; gap: 6px; margin-top: 8px; }
    .rl-btn-cancel {
      flex: 1; padding: 5px; border: 1px solid var(--border); border-radius: 5px;
      background: none; color: var(--text2); font-size: 12px; cursor: pointer;
    }
    .rl-btn-cancel:hover { color: var(--text); border-color: var(--text2); }
    .rl-btn-confirm {
      flex: 2; padding: 5px; border: none; border-radius: 5px;
      background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .rl-btn-confirm:hover { background: var(--accent-hover); }

    .rl-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--bg1); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 5px 5px;
      max-height: 120px; overflow-y: auto; z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
    }
    .rl-dropdown.hidden { display: none; }
    .rl-dropdown-item {
      padding: 6px 8px; font-size: 12px; color: var(--text); cursor: pointer;
    }
    .rl-dropdown-item:hover { background: var(--bg0); color: var(--accent); }

    .page-revisit-info {
      margin-top: 5px; font-size: 11px; color: var(--text3);
    }

    .settings-row {
      display: flex; align-items: center;
      justify-content: space-between; color: var(--text2); font-size: 12px;
      margin-top: 8px;
    }
    .toggle { position: relative; display: inline-block; width: 32px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 9px; transition: background .2s;
    }
    .toggle-track::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: #fff; top: 3px; left: 3px; transition: transform .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::before { transform: translateX(14px); }

    .sync-section { border-top: 1px solid var(--border); }
    .sync-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; cursor: pointer;
      font-size: 12px; color: var(--text2); user-select: none;
    }
    .sync-row:hover { background: var(--bg1); }
    .sync-right { display: flex; align-items: center; gap: 5px; }
    .sync-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600;
    }
    .sync-badge-off { background: var(--bg1); color: var(--text3); }
    .sync-badge-ok  { background: #14532d; color: #4ade80; }
    .sync-badge-warn { background: #431407; color: #fb923c; }
    [data-theme="light"] .sync-badge-ok  { background: #dcfce7; color: #16a34a; }
    [data-theme="light"] .sync-badge-warn { background: #fff7ed; color: #c2410c; }
    .sync-arrow { font-size: 12px; color: var(--text3); transition: transform .15s; display: inline-block; }
    .sync-arrow.open { transform: rotate(90deg); }
    .sync-panel { padding: 0 14px 12px; border-top: 1px solid var(--border); }
    .sync-panel.hidden { display: none; }
    .sync-token-wrap { display: flex; gap: 6px; margin-top: 10px; }
    .sync-token-input {
      flex: 1; padding: 5px 8px;
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 11px; outline: none;
    }
    .sync-token-input:focus { border-color: var(--accent); }
    .sync-connect-btn {
      padding: 5px 10px; border: none; border-radius: 5px;
      background: var(--accent); color: #fff;
      font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .sync-connect-btn:hover { background: var(--accent-hover); }
    .sync-connect-btn:disabled { background: var(--bg1); color: var(--text3); cursor: default; }
    .sync-info { margin-top: 8px; }
    .sync-info.hidden { display: none; }
    .sync-gist-row { font-size: 11px; color: var(--text3); margin-bottom: 7px; }
    .sync-gist-id { font-family: monospace; color: var(--text2); cursor: pointer; }
    .sync-gist-id:hover { color: var(--accent); }
    .sync-action-btns { display: flex; gap: 6px; margin-top: 8px; }
    .sync-action-btns.hidden { display: none; }
    .sync-action-btn {
      flex: 1; padding: 6px; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: background .1s, color .1s;
    }
    .sync-pull-btn {
      border: 1px solid var(--border); background: none; color: var(--text2);
    }
    .sync-pull-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .sync-push-btn { border: none; background: var(--accent); color: #fff; }
    .sync-push-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .sync-action-btn:disabled { opacity: 0.4; cursor: default; }
    .sync-feedback { margin-top: 6px; font-size: 11px; min-height: 16px; }

    .donate-footer {
      border-top: 1px solid var(--border);
      padding: 9px 14px;
      text-align: center;
    }
    .donate-link {
      font-size: 11px; color: var(--text3);
      text-decoration: none; transition: color .12s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .donate-link:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">W</div>
    <h1>WikiTrace</h1>
    <button class="theme-btn" id="btn-theme" title="Toggle theme">☀</button>
    <button class="dashboard-link" id="open-dashboard">Dashboard →</button>
  </div>

  <div class="page-block" id="page-block">
    <div class="page-label">Current page</div>
    <div class="page-title" id="page-title"><span class="not-wiki">Not a Wikipedia page</span></div>
    <div class="page-cats" id="page-cats"></div>
    <div class="page-revisit-info hidden" id="page-revisit-info"></div>
  </div>

  <div class="rl-picker" id="rl-picker">
    <div class="rl-picker-label">Category</div>
    <div style="position: relative;">
      <input type="text" class="rl-input" id="rl-category-input" placeholder="Search or create new…" autocomplete="off">
      <div id="rl-dropdown" class="rl-dropdown hidden"></div>
    </div>
    <div class="rl-cats" id="rl-existing-cats"></div>
    <div class="rl-picker-actions">
      <button class="rl-btn-confirm" id="rl-confirm" style="flex: 1; margin-top: 4px;">Save to reading list</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-pages">—</div>
      <div class="stat-label">Pages</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-cats">—</div>
      <div class="stat-label">Categories</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-today">—</div>
      <div class="stat-label">Today</div>
    </div>
  </div>

  <div class="settings">
    <label>
      Save mode
      <select id="save-mode">
        <option value="auto">Automatic</option>
        <option value="scroll">On scroll bottom</option>
        <option value="manual">Manual only</option>
      </select>
    </label>
    <div class="settings-row">
      Revisit icon
      <label class="toggle" title="Show orange icon when you open a previously saved page">
        <input type="checkbox" id="revisit-notify">
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div id="status-msg"></div>

  <div class="sync-section">
    <div class="sync-row" id="sync-toggle">
      <span>Sync</span>
      <div class="sync-right">
        <span class="sync-badge sync-badge-off" id="sync-badge">Off</span>
        <span class="sync-arrow" id="sync-arrow">›</span>
      </div>
    </div>
    <div class="sync-panel hidden" id="sync-panel">
      <div class="sync-token-wrap">
        <input type="password" id="sync-token-input" class="sync-token-input"
               placeholder="GitHub token (gist scope)" autocomplete="off">
        <button id="btn-sync-connect" class="sync-connect-btn">Connect</button>
      </div>
      <div class="sync-info hidden" id="sync-info">
        <div class="sync-gist-row">
          Gist: <span id="sync-gist-id" class="sync-gist-id" title="">—</span>
        </div>
      </div>
      <div class="sync-action-btns hidden" id="sync-action-btns">
        <button id="btn-sync-pull" class="sync-action-btn sync-pull-btn">← Pull</button>
        <button id="btn-sync-push" class="sync-action-btn sync-push-btn">Push →</button>
      </div>
      <div id="sync-feedback" class="sync-feedback"></div>
    </div>
  </div>

  <div class="donate-footer">
    <a class="donate-link" href="https://paypal.me/RobertoReale12" target="_blank" rel="noopener noreferrer">
      ☕ Buy me a coffee — keep this extension free
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
