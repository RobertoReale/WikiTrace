<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiTrace</title>
  <style>
    :root {
      --bg0: #0f172a;
      --bg1: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #4ade80;
      --badge-saved-bg: #14532d;
      --badge-saved-color: #4ade80;
      --badge-unsaved-bg: #1e293b;
    }

    [data-theme="light"] {
      --bg0: #f8fafc;
      --bg1: #f1f5f9;
      --border: #cbd5e1;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --success: #16a34a;
      --badge-saved-bg: #dcfce7;
      --badge-saved-color: #16a34a;
      --badge-unsaved-bg: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: var(--bg0);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 22px; height: 22px; background: var(--accent); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .theme-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 14px; padding: 2px 5px;
      border-radius: 4px; line-height: 1;
    }
    .theme-btn:hover { background: var(--bg1); color: var(--text); }
    .dashboard-link {
      font-size: 11px; color: var(--accent); text-decoration: none;
      cursor: pointer; background: none; border: none;
      padding: 2px 6px; border-radius: 4px;
    }
    .dashboard-link:hover { background: var(--bg1); }

    .page-block { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .page-label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text3); margin-bottom: 5px;
    }
    .page-title {
      font-weight: 600; color: var(--text); line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .page-cats { margin-top: 4px; font-size: 11px; color: var(--text2); }
    .badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600; letter-spacing: .03em;
    }
    .badge-saved   { background: var(--badge-saved-bg); color: var(--badge-saved-color); }
    .badge-unsaved { background: var(--badge-unsaved-bg); color: var(--text2); }
    .not-wiki { color: var(--text3); font-style: italic; }

    .btn-save {
      display: block; width: calc(100% - 28px); margin: 10px 14px 0;
      padding: 8px; border: none; border-radius: 6px;
      background: var(--accent); color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-save:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-save:disabled { background: var(--bg1); color: var(--text3); cursor: default; }

    .stats { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-top: 12px; }
    .stat { flex: 1; padding: 10px 0; text-align: center; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label {
      font-size: 10px; color: var(--text3); margin-top: 3px;
      text-transform: uppercase; letter-spacing: .05em;
    }

    .settings { padding: 12px 14px; }
    .settings label {
      display: flex; align-items: center;
      justify-content: space-between; color: var(--text2); font-size: 12px;
    }
    select {
      background: var(--bg1); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 3px 6px; font-size: 12px; cursor: pointer; outline: none;
    }
    select:focus { border-color: var(--accent); }

    #status-msg { padding: 0 14px 10px; font-size: 11px; color: var(--success); min-height: 20px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">W</div>
    <h1>WikiTrace</h1>
    <button class="theme-btn" id="btn-theme" title="Toggle theme">☀</button>
    <button class="dashboard-link" id="open-dashboard">Dashboard →</button>
  </div>

  <div class="page-block" id="page-block">
    <div class="page-label">Current page</div>
    <div class="page-title" id="page-title"><span class="not-wiki">Not a Wikipedia page</span></div>
    <div class="page-cats" id="page-cats"></div>
  </div>

  <button class="btn-save" id="btn-save" disabled>Save this page</button>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-pages">—</div>
      <div class="stat-label">Pages</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-cats">—</div>
      <div class="stat-label">Categories</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-today">—</div>
      <div class="stat-label">Today</div>
    </div>
  </div>

  <div class="settings">
    <label>
      Save mode
      <select id="save-mode">
        <option value="auto">Automatic</option>
        <option value="scroll">On scroll bottom</option>
        <option value="manual">Manual only</option>
      </select>
    </label>
  </div>

  <div id="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
